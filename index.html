#unitInfo .name{font-size:14px;font-weight:700;color:#ffd700}

#logBox .logGood{color:#4cff4c}#logBox .logBad{color:#ff6b6b}#logBox .logInfo{color:#ffd700}
.btnRow{display:flex;gap:6px}

// ================================================================
//  PIXEL SPRITE GENERATOR
// ================================================================
// Sprite format: array of strings, each char = pixel color
// Colors: _=transparent, S=skin, H=hair, B=blue, R=red, W=white
//         G=gray, D=dark, Y=gold, L=leather, M=magic, A=darkred
//         C=cyan, O=orange, K=pink, T=teal, P=purple
const SPRITE_SCALE = 3; // 3x pixel rendering
const SPRITE_W = 16, SPRITE_H = 24;

function parseSprite(lines){
  // Create offscreen canvas for the sprite
  const c=document.createElement('canvas');
  c.width=SPRITE_W; c.height=SPRITE_H;
  const cx=c.getContext('2d');
  for(let y=0;y<Math.min(lines.length,SPRITE_H);y++){
    for(let x=0;x<Math.min(lines[y].length,SPRITE_W);x++){
      const ch=lines[y][x];
      if(ch==='_') continue;
      const color=SPRITE_COLORS[ch]||'#000';
      cx.fillStyle=color;
      cx.fillRect(x,y,1,1);
    }
  }
  return c;
}
function drawSprite(spr, sx, sy, sw, sh){
  ctx.drawImage(spr, 0,0,SPRITE_W,SPRITE_H, sx, sy, sw, sh);
}
function drawSpriteFlipped(spr, sx, sy, sw, sh){
  ctx.save(); ctx.translate(sx+sw/2,sy); ctx.scale(-1,1);
  ctx.drawImage(spr,0,0,SPRITE_W,SPRITE_H,-sw/2,0,sw,sh);
  ctx.restore();
}

// Map class -> sprite
function getSprite(unit){
  if(!unit.pixelSprite){
    // Determine sprite based on class and team
    const cls = unit.cls;
    if(unit.team==='player'){
      if(cls==='领主') unit.pixelSprite = SPRITES.lord;
      else if(cls==='骑士') unit.pixelSprite = SPRITES.knight;
      else if(cls==='佣兵') unit.pixelSprite = SPRITES.fighter;
      else if(cls==='魔法师') unit.pixelSprite = SPRITES.mage;
      else if(cls==='僧侣') unit.pixelSprite = SPRITES.priest;
      else if(cls==='龙骑士') unit.pixelSprite = SPRITES.dragon_knight;
      else if(cls==='弓箭手') unit.pixelSprite = SPRITES.archer;
      else unit.pixelSprite = SPRITES.knight;
    }else{
      if(cls==='战士'||cls==='蛮族战士') unit.pixelSprite = SPRITES.fighter;
      else if(cls==='魔法师'||cls==='暗魔法师') unit.pixelSprite = SPRITES.enemy_mage;
      else if(cls==='重甲骑士'||cls==='重甲兵') unit.pixelSprite = SPRITES.enemy_heavy;
      else if(cls==='龙骑士'||cls==='龙骑·猎手') unit.pixelSprite = SPRITES.dragon_knight;
      else unit.pixelSprite = SPRITES.fighter;
    }
  }
  return unit.pixelSprite;
}

  units.push(makeUnit({name:'蛮族斧兵',cls:'战士',team:'enemy',x:13,y:7,weaponType:'斧',maxHp:24,str:11,mag:0,skill:5,spd:5,def:4,res:1,move:2,maxDura:18,isFlying:false,canHeal:false}));
  updateUI(); render();
  showRecruitment();
}

// ---- Terrain ----
function isBlocked(x,y,flying){
  if(x<0||x>=MAP_W||y<0||y>=MAP_H) return true;
  const t=terrainMap[y][x];
  if((t===2||t===3)&&!flying) return true;
  return false;
}
function moveCost(x,y,flying){
  if(x<0||x>=MAP_W||y<0||y>=MAP_H) return 999;
  if(flying) return 1;
  const t=terrainMap[y][x];
  if(t===1) return 2;
  if(t===2||t===3) return 999;
  return 1;
}
function getUnitAt(x,y){return units.find(u=>u.x===x&&u.y===y&&u.hp>0);}

// ---- BFS Movement ----
function getMoveRange(unit){
  const range=[], visited=new Set(), queue=[{x:unit.x,y:unit.y,cost:0}];
  visited.add(`${unit.x},${unit.y}`); range.push({x:unit.x,y:unit.y});
  while(queue.length){
    const cur=queue.shift();
    for(const [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]){
      const nx=cur.x+dx, ny=cur.y+dy;
      if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
      if(visited.has(`${nx},${ny}`)) continue;
      if(isBlocked(nx,ny,unit.isFlying)) continue;
      const addCost=moveCost(nx,ny,unit.isFlying);
      const totalCost=cur.cost+addCost;
      if(totalCost>unit.move) continue;
      const occ=getUnitAt(nx,ny);
      if(occ&&!(nx===unit.x&&ny===unit.y)) continue;
      visited.add(`${nx},${ny}`);
      queue.push({x:nx,y:ny,cost:totalCost});
      range.push({x:nx,y:ny});
    }
  }
  return range;
}

// ---- Attack Targets ----
function getAttackTargets(unit){
  const targets=[], isRanged=(unit.weaponType==='弓'||unit.weaponType==='魔法');
  const maxRange=isRanged?2:1, visited=new Set([`${unit.x},${unit.y}`]);
  const queue=[{x:unit.x,y:unit.y,d:0}];
  while(queue.length){
    const cur=queue.shift();
    if(cur.d>=maxRange) continue;
    for(const [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]){
      const nx=cur.x+dx, ny=cur.y+dy;
      if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) continue;
      if(visited.has(`${nx},${ny}`)) continue;
      visited.add(`${nx},${ny}`);
      const e=getUnitAt(nx,ny);
      if(e&&e.team!==unit.team&&e.hp>0) targets.push(e);
      if(cur.d+1<maxRange) queue.push({x:nx,y:ny,d:cur.d+1});
    }
  }
  return targets;
}
function getHealTargets(unit){
  if(!unit.canHeal||unit.weaponDurability<=0) return [];
  const targets=[];
  for(const [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]){
    const nx=unit.x+dx, ny=unit.y+dy;
    const ally=getUnitAt(nx,ny);
    if(ally&&ally.team===unit.team&&ally.hp<ally.maxHp) targets.push(ally);
  }
  return targets;
}

// ---- Combat ----
function calcDamage(atk,def){
  let base=atk.weaponType==='魔法'?atk.mag+4-def.res:atk.str+5-def.def;
  const adv=weaponAdvantage(atk.weaponType,def.weaponType);
  if(adv===1) base+=2; if(adv===-1) base-=2;
  if(atk.weaponType==='弓'&&def.isFlying) base=Math.ceil(base*1.5);
  // Lord aura
  const lord=units.find(u=>u.name==='王子·艾克'&&u.hp>0);
  if(lord){
    if(atk.team==='player'&&Math.abs(atk.x-lord.x)<=2&&Math.abs(atk.y-lord.y)<=2&&atk!==lord) base+=1;
    if(def.team==='player'&&Math.abs(def.x-lord.x)<=2&&Math.abs(def.y-lord.y)<=2&&def!==lord) base-=1;
  }
  return Math.max(1,Math.floor(base));
}
function weaponAdvantage(atk,def){
  if(TRIANGLE[atk]===def) return 1;
  if(TRIANGLE[def]===atk) return -1;
  return 0;
}
function executeCombat(attacker,defender,isCtr=false){
  if(!isCtr) attacker.weaponDurability--;
  const dmg=calcDamage(attacker,defender);
  defender.hp-=dmg;
  let log=`${attacker.name}(${WEAPON[attacker.weaponType]}) → ${defender.name}: ${dmg} 点伤害！`;
  if(attacker.weaponType==='弓'&&defender.isFlying) log+=' [特效·克飞行]';
  if(!isCtr&&weaponAdvantage(attacker.weaponType,defender.weaponType)===1) log+=' [武器克制]';
  addLog(log,'logGood');
  if(attacker.weaponDurability<=0) addLog(`${attacker.name} 武器耐久耗尽！`,'logBad');
  if(defender.hp<=0){defender.hp=0;addLog(`${defender.name} 被击败！`,'logBad');}
  else if(!isCtr&&!attacker.canHeal){
    const canCntr=!defender.canHeal&&defender.weaponDurability>0;
    const cr=(defender.weaponType==='弓'||defender.weaponType==='魔法')?2:1;
    const dist=Math.abs(attacker.x-defender.x)+Math.abs(attacker.y-defender.y);
    if(canCntr&&dist<=cr&&defender.hp>0){addLog(`${defender.name} 反击！`,'logInfo');executeCombat(defender,attacker,true);}
  }
  if(attacker.hp<=0) attacker.hp=0;
  if(defender.hp<=0) defender.hp=0;
}
function executeHeal(healer,target){
  const healAmt=Math.min(10+healer.mag, target.maxHp-target.hp);
  target.hp+=healAmt; healer.weaponDurability--;
  addLog(`${healer.name} 治愈 ${target.name} +${healAmt} HP！`,'logInfo');
  if(healer.weaponDurability<=0) addLog(`${healer.name} 杖耐久耗尽！`,'logBad');
}
function checkWinLoss(){
  const pAlive=units.filter(u=>u.team==='player'&&u.hp>0);
  const eAlive=units.filter(u=>u.team==='enemy'&&u.hp>0);
  if(pAlive.length===0){gameOver=true;addLog('💀 全军覆没…战斗失败！','logBad');return true;}
  if(eAlive.length===0){gameOver=true;addLog('🏆 敌方全灭！胜利！','logInfo');return true;}
  return false;
}

// ================================================================
//  RENDERING (Pixel Art)
// ================================================================
function render(){
  ctx.clearRect(0,0,W,H);

  // Draw terrain with pixel art dithering
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      const t=terrainMap[y][x];
      const tx=x*TILE, ty=y*TILE;

      // Base fill
      ctx.fillStyle=terrColors[t];
      ctx.fillRect(tx,ty,TILE,TILE);

      // Pixel dithering / texture
      if(t===0){ // Plains
        for(let i=0;i<TILE;i+=8){
          for(let j=0;j<TILE;j+=8){
            if((i+j)%16===0){
              ctx.fillStyle='#4a7a2a'; ctx.fillRect(tx+i,ty+j,4,4);
            }else if((i+j)%16===12){
              ctx.fillStyle='#6a9a4a'; ctx.fillRect(tx+i,ty+j,4,4);
            }
          }
        }
      }else if(t===1){ // Forest
        ctx.fillStyle='#1a3a0a';
        ctx.fillRect(tx+8,ty+8,TILE-16,TILE-16);
        // Tree trunks
        ctx.fillStyle='#4a3020';
        ctx.fillRect(tx+24,ty+16,16,20);
        ctx.fillRect(tx+32,ty+20,12,24);
        // Canopy
        ctx.fillStyle='#1a5a0a';
        ctx.beginPath(); ctx.arc(tx+TILE/2,ty+16,20,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#2a6a1a';
        ctx.beginPath(); ctx.arc(tx+TILE/2-4,ty+12,16,0,Math.PI*2); ctx.fill();
      }else if(t===2){ // Mountain
        // Rocky shape
        ctx.fillStyle='#5a4a3a';
        ctx.beginPath(); ctx.moveTo(tx+4,ty+TILE); ctx.lineTo(tx+4,ty+20); ctx.lineTo(tx+20,ty+8);
        ctx.lineTo(tx+32,ty+20); ctx.lineTo(tx+44,ty+4); ctx.lineTo(tx+56,ty+16); ctx.lineTo(tx+60,ty+TILE); ctx.fill();
        ctx.fillStyle='#6a5a4a';
        ctx.beginPath(); ctx.moveTo(tx+10,ty+TILE); ctx.lineTo(tx+10,ty+28); ctx.lineTo(tx+22,ty+14);
        ctx.lineTo(tx+34,ty+22); ctx.lineTo(tx+42,ty+8); ctx.lineTo(tx+50,ty+20); ctx.lineTo(tx+54,ty+TILE); ctx.fill();
        // Snow cap
        ctx.fillStyle='#e8e8e8';
        ctx.fillRect(tx+18,ty+6,18,6);
        ctx.fillRect(tx+38,ty+2,12,6);
      }else if(t===3){ // Lake
        // Water with wave effect
        ctx.fillStyle='#2a5a9a';
        ctx.fillRect(tx,ty,TILE,TILE);
        for(let i=0;i<TILE;i+=12){
          ctx.fillStyle='#3a6aaa';
          ctx.fillRect(tx+i,ty+(frameCount%12),12,3);
          ctx.fillStyle='#4a80c0';
          ctx.fillRect(tx+i+6,ty+(frameCount%12)+6,8,2);
        }
      }

      // Grid lines (subtle)
      ctx.strokeStyle='rgba(0,0,0,.15)';
      ctx.lineWidth=1;
      ctx.strokeRect(tx,ty,TILE,TILE);
    }
  }

  // Draw move range
  for(const m of moveRange){
    const mx=m.x*TILE, my=m.y*TILE;
    if(!getUnitAt(m.x,m.y)||(getUnitAt(m.x,m.y)===selectedUnit)){
      ctx.fillStyle='rgba(0,220,80,.3)';
      ctx.fillRect(mx+2,my+2,TILE-4,TILE-4);
      ctx.strokeStyle='rgba(0,255,100,.6)';
      ctx.lineWidth=2; ctx.strokeRect(mx+2,my+2,TILE-4,TILE-4);
    }
  }

  // Draw attack targets
  for(const t of attackTargets){
    const tx=t.x*TILE, ty=t.y*TILE;
    ctx.strokeStyle=t._heal?'#44ff44':'#ff3333';
    ctx.lineWidth=3; ctx.setLineDash([4,4]);
    ctx.strokeRect(tx+3,ty+3,TILE-6,TILE-6);
    ctx.setLineDash([]);
  }

  // Draw units with pixel sprites
  for(const u of units){
    if(u.hp<=0) continue;
    const ux=u.x*TILE, uy=u.y*TILE;
    const spr=getSprite(u);
    const spriteW=SPRITE_W*SPRITE_SCALE, spriteH=SPRITE_H*SPRITE_SCALE;
    const sdx=ux+(TILE-spriteW)/2, sdy=uy+8;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(ux+TILE/2, uy+TILE-2, spriteW/2-4, 4, 0, 0, Math.PI*2); ctx.fill();

    // Draw sprite
    if(u.team==='enemy'){
      drawSpriteFlipped(spr, sdx, sdy, spriteW, spriteH);
    }else{
      drawSprite(spr, sdx, sdy, spriteW, spriteH);
    }

    // HP bar
    const hpW=54, hpH=5, hpX=ux+5, hpY=uy;
    ctx.fillStyle='#111'; ctx.fillRect(hpX,hpY,hpW,hpH);
    const hpPct=u.hp/u.maxHp;
    ctx.fillStyle=hpPct>.5?'#4cff4c':hpPct>.25?'#ffcc00':'#ff3333';
    ctx.fillRect(hpX,hpY,Math.max(1,hpW*hpPct),hpH);
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(hpX,hpY,hpW,hpH);
    ctx.fillStyle='#fff'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText(`${u.hp}/${u.maxHp}`,ux+TILE/2,uy+4+hpH);

    // Acted check ✓
    if(u.acted){
      ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(ux+2,uy+30,16,14);
      ctx.fillStyle='#ffd700'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText('✓',ux+10,uy+42);
    }

    // Selected glow
    if(u===selectedUnit){
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=3; ctx.setLineDash([3,2]);
      ctx.strokeRect(ux+2,uy+2,TILE-4,TILE-4); ctx.setLineDash([]);
    }
  }
}

// ================================================================
//  UI
// ================================================================
function updateUI(){
  const ti=document.getElementById('turnInd');
  ti.textContent=phase==='player'?'🔵 玩家回合':'🔴 敌方回合';
  ti.className=phase;
  const info=document.getElementById('unitInfo');
  if(selectedUnit){
    const u=selectedUnit;
    const tags=[];
    if(u.isFlying) tags.push('🦅飞行');
    if(u.canHeal) tags.push('💚治疗');
    info.innerHTML=`<div class="name">${u.name} [${u.cls}] ${tags.join(' ')}</div>
      <div class="stat"><span class="label">❤️HP</span> ${u.hp}/${u.maxHp}</div>
      <div class="stat"><span class="label">⚔力量</span> ${u.str}</div>
      <div class="stat"><span class="label">🔮魔力</span> ${u.mag}</div>
      <div class="stat"><span class="label">🛡防御</span> ${u.def}</div>
      <div class="stat"><span class="label">✨魔防</span> ${u.res}</div>
      <div class="stat"><span class="label">👟移动</span> ${u.move}</div>
      <div class="stat"><span class="label">🗡${WEAPON[u.weaponType]}</span> ${u.weaponDurability}/${u.maxDura}</div>`;
  }else{info.innerHTML='<span class="label">选择单位查看详情</span>';}
  document.getElementById('goldDisplay').textContent=`💰 金币: ${gold} G`;
  updateRecruitList();
}
function addLog(msg,cls=''){
  logMessages.push({msg,cls});
  if(logMessages.length>50) logMessages.shift();
  const box=document.getElementById('logBox');
  box.innerHTML=logMessages.map(l=>`<div class="${l.cls}">${l.msg}</div>`).join('');
  box.scrollTop=box.scrollHeight;
}

// ---- Recruitment ----
function showRecruitment(){if(!gameOver){updateRecruitList();document.getElementById('modalOverlay').classList.add('show');}}
function hideRecruitment(){document.getElementById('modalOverlay').classList.remove('show');render();updateUI();}
function updateRecruitList(){
  const list=document.getElementById('recruitList');
  const spot=findSpawnSpot();
  list.innerHTML=RECRUITS.map((r,i)=>{
    const can=gold>=r.price&&spot!==null;
    return `<div class="recruitItem">
      <span class="rName">${r.name}</span>
      <span class="rStats">${r.cls} | ${WEAPON[r.weaponType]} | HP${r.maxHp} 力${r.str} 防${r.def} 移${r.move}${r.isFlying?'🦅':''}${r.canHeal?'💚':''}</span>
      <span class="rPrice">${r.price}G</span>
      <button onclick="recruitUnit(${i})" ${!can?'disabled':''}>${!spot?'无空位':gold>=r.price?'招募':'金币不足'}</button></div>`;
  }).join('');
}
function findSpawnSpot(){
  for(let x=0;x<3;x++) for(let y=0;y<MAP_H;y++) if(!getUnitAt(x,y)&&!isBlocked(x,y,false)) return{x,y};
  return null;
}
function recruitUnit(idx){
  const r=RECRUITS[idx];
  if(gold<r.price) return;
  const spot=findSpawnSpot(); if(!spot) return;
  gold-=r.price;
  units.push(makeUnit({...r,team:'player',x:spot.x,y:spot.y}));
  addLog(`招募 ${r.name}(${r.cls})！花费 ${r.price}G`,'logInfo');
  updateRecruitList(); render(); updateUI();
}

// ================================================================
//  CANVAS CLICK
// ================================================================
canvas.addEventListener('click',(e)=>{
  if(gameOver||phase==='enemy') return;
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
  const gx=Math.floor(mx/TILE), gy=Math.floor(my/TILE);
  if(gx<0||gx>=MAP_W||gy<0||gy>=MAP_H) return;

  const clickedUnit=getUnitAt(gx,gy);
  const clickedInMove=moveRange.find(m=>m.x===gx&&m.y===gy);
  const clickedAttack=attackTargets.find(t=>t.x===gx&&t.y===gy);

  if(!selectedUnit){
    if(clickedUnit&&clickedUnit.team==='player'&&!clickedUnit.acted) selectUnit(clickedUnit);
    return;
  }

  if(attackTargets.length>0){
    if(clickedAttack){doAction(selectedUnit,clickedAttack);return;}
    if(clickedInMove){moveUnit(selectedUnit,gx,gy);attackTargets=[];postMoveCheck();render();updateUI();return;}
    if(clickedUnit===selectedUnit){attackTargets=[];selectUnit(selectedUnit);return;}
    return;
  }

  if(clickedInMove&&!getUnitAt(gx,gy)){moveUnit(selectedUnit,gx,gy);postMoveCheck();render();updateUI();return;}
  if(clickedUnit&&clickedUnit.team==='player'&&!clickedUnit.acted){selectUnit(clickedUnit);return;}
  if(!clickedInMove&&!clickedAttack){selectedUnit=null;moveRange=[];attackTargets=[];render();updateUI();}
});

function selectUnit(unit){
  selectedUnit=unit; moveRange=getMoveRange(unit); attackTargets=[];
  addLog(`选中 ${unit.name}，请选择移动位置`,''); render(); updateUI();
}
function moveUnit(unit, gx, gy){unit.x=gx; unit.y=gy; addLog(`${unit.name} 移动到 (${gx},${gy})`,''); moveRange=[];}
function postMoveCheck(){
  const atks=getAttackTargets(selectedUnit);
  if(atks.length>0&&!selectedUnit.canHeal){attackTargets=atks; addLog(`${selectedUnit.name} 移动完毕，选择攻击目标`,'logInfo');}
  else if(getHealTargets(selectedUnit).length>0){attackTargets=getHealTargets(selectedUnit).map(t=>({...t,_heal:true})); addLog(`${selectedUnit.name} 移动完毕，选择治疗目标`,'logInfo');}
  else finishAction(selectedUnit);
}
function doAction(attacker,defender){
  if(defender._heal){executeHeal(attacker,defender);}
  else executeCombat(attacker,defender);
  finishAction(attacker); units=units.filter(u=>u.hp>0);
  if(!checkWinLoss()){render();updateUI();}
}
function finishAction(unit){unit.acted=true;selectedUnit=null;moveRange=[];attackTargets=[];addLog(`${unit.name} 行动完毕`,'');render();updateUI();}

// ================================================================
//  END TURN & ENEMY AI
// ================================================================
let frameCount=0;
function endTurn(){
  if(gameOver||phase==='enemy') return;
  if(selectedUnit){selectedUnit.acted=true;selectedUnit=null;moveRange=[];attackTargets=[];}
  phase='enemy'; addLog('⚔ 敌方回合开始...','logInfo'); updateUI(); render(); runEnemyAI();
}
async function runEnemyAI(){
  const enemies=units.filter(u=>u.team==='enemy'&&u.hp>0).sort(()=>Math.random()-.5);
  for(const enemy of enemies){
    if(gameOver) return;
    await sleep(420);
    if(enemy.hp<=0) continue;
    const players=units.filter(u=>u.team==='player'&&u.hp>0);
    if(players.length===0) return;
    let nearest=players[0], minDist=Math.abs(enemy.x-nearest.x)+Math.abs(enemy.y-nearest.y);
    for(const p of players){const d=Math.abs(enemy.x-p.x)+Math.abs(enemy.y-p.y);if(d<minDist){minDist=d;nearest=p;}}

    const atks=getAttackTargets(enemy);
    const adj=atks.filter(t=>Math.abs(t.x-enemy.x)+Math.abs(t.y-enemy.y)===1);
    if(adj.length>0&&enemy.weaponDurability>0&&!enemy.canHeal){
      const target=adj.sort((a,b)=>a.hp-b.hp)[0];
      executeCombat(enemy,target); units=units.filter(u=>u.hp>0);
      if(checkWinLoss()){render();updateUI();return;}
      render();updateUI(); continue;
    }

    const range=getMoveRange(enemy);
    const valid=range.filter(m=>{const occ=getUnitAt(m.x,m.y);return!occ||occ===enemy;});
    let bestMove={x:enemy.x,y:enemy.y}, bestDist=minDist;
    for(const m of valid){const d=Math.abs(m.x-nearest.x)+Math.abs(m.y-nearest.y);if(d<bestDist){bestDist=d;bestMove=m;}}
    enemy.x=bestMove.x; enemy.y=bestMove.y;

    const postAtks=getAttackTargets(enemy);
    const postAdj=postAtks.filter(t=>Math.abs(t.x-enemy.x)+Math.abs(t.y-enemy.y)===1);
    if(postAdj.length>0&&enemy.weaponDurability>0&&!enemy.canHeal){
      const target=postAdj.sort((a,b)=>a.hp-b.hp)[0];
      executeCombat(enemy,target); units=units.filter(u=>u.hp>0);
      if(checkWinLoss()){render();updateUI();return;}
    }
    render();updateUI();
  }
  units.forEach(u=>{u.acted=false;});
  phase='player'; addLog('🔵 玩家回合','logInfo'); updateUI(); render();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ---- Animation loop (for water animation) ----
function animLoop(){frameCount++;render();requestAnimationFrame(animLoop);}

// ================================================================
//  INIT
// ================================================================
resetGame();
animLoop();
</script>
